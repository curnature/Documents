name: Deploy VitePress to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: VitePress/package-lock.json

      - name: Install dependencies
        working-directory: VitePress
        run: npm ci

      - name: Build site
        working-directory: VitePress
        run: npm run docs:build

      - name: Deploy to VPS via rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          # The trailing slash on SOURCE is very important! It tells rsync to copy the contents, not the folder itself.
          SOURCE: "VitePress/docs/.vitepress/dist/"
          TARGET: "/var/www/html/"